name: fund
description: "Mobile app for two users to manage shared pool of money with real-time sync."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9

  # Dependency Injection
  get_it: ^7.6.0

  # Supabase Integration
  supabase_flutter: ^1.10.4

  # Local Database
  sqflite: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24

  # Analytics & Logging
  logger: ^2.1.0

  # Date & Time
  intl: ^0.19.0

  # JSON Serialization
  json_annotation: ^4.8.1

  # HTTP & Networking
  http: ^1.1.0

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # UI Components
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.2.0

  # Utilities
  equatable: ^2.0.5
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
